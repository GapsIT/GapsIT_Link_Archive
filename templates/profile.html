<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Gaps IT Link Archive Portal</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <!-- Theme Toggle Button -->
    <button
      class="theme-toggle"
      onclick="toggleTheme()"
      aria-label="Toggle theme"
    >
      <svg
        class="sun-icon"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
        ></path>
      </svg>
      <svg
        class="moon-icon"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        style="display: none"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
        ></path>
      </svg>
    </button>

    <!-- Mobile Overlay -->
    <div
      class="mobile-overlay"
      id="mobileOverlay"
      onclick="toggleMobileMenu()"
    ></div>

    <nav class="navbar">
      <div class="nav-content">
        <h2>Gaps IT Link Archive</h2>
        <button
          class="hamburger"
          id="hamburger"
          onclick="toggleMobileMenu()"
          aria-label="Menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-right" id="navRight">
          <span class="user-info">
            {{ employee.name }} ({{ employee.position }}) {% if
            employee.is_admin %}<span class="admin-badge">ADMIN</span>{% endif
            %}
          </span>
          <a href="/dashboard" class="btn btn-secondary">My Links</a>
          {% if employee.is_admin %}
          <a href="/admin" class="btn btn-secondary">Admin Panel</a>
          {% endif %}
          <a href="/logout" class="btn btn-outline">Logout</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="header">
        <div>
          <h1>My Profile</h1>
          <p class="subtitle">View and manage your account information</p>
        </div>
      </div>

      <div class="profile-container">
        <!-- Profile Information Card -->
        <div class="profile-card">
          <h2>
            <svg
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              style="
                display: inline-block;
                vertical-align: middle;
                margin-right: 8px;
              "
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              ></path>
            </svg>
            Personal Information
          </h2>
          <div id="profileInfo" class="profile-info-grid">
            <div class="skeleton skeleton-text" style="height: 45px"></div>
            <div class="skeleton skeleton-text" style="height: 45px"></div>
            <div class="skeleton skeleton-text" style="height: 45px"></div>
            <div class="skeleton skeleton-text" style="height: 45px"></div>
            <div class="skeleton skeleton-text" style="height: 45px"></div>
            <div class="skeleton skeleton-text" style="height: 45px"></div>
          </div>
        </div>

        <!-- Change Password Card -->
        <div class="profile-card">
          <h2>
            <svg
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              style="
                display: inline-block;
                vertical-align: middle;
                margin-right: 8px;
              "
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
              ></path>
            </svg>
            Change Password
          </h2>
          <form id="changePasswordForm">
            <div class="form-group">
              <label for="oldPassword">Current Password *</label>
              <input
                type="password"
                id="oldPassword"
                required
                placeholder="Enter current password"
              />
            </div>

            <div class="form-group">
              <label for="newPassword">New Password *</label>
              <input
                type="password"
                id="newPassword"
                required
                minlength="6"
                placeholder="Enter new password"
              />
              <small>Minimum 6 characters</small>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm New Password *</label>
              <input
                type="password"
                id="confirmPassword"
                required
                minlength="6"
                placeholder="Confirm new password"
              />
            </div>

            <div
              id="passwordError"
              class="error-message"
              style="display: none"
            ></div>
            <div
              id="passwordSuccess"
              class="success-message"
              style="display: none"
            ></div>

            <button
              type="submit"
              id="changePasswordBtn"
              class="btn btn-primary"
            >
              <span class="btn-text">Update Password</span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Mobile Menu Toggle
      function toggleMobileMenu() {
        const hamburger = document.getElementById("hamburger");
        const navRight = document.getElementById("navRight");
        const overlay = document.getElementById("mobileOverlay");

        hamburger.classList.toggle("active");
        navRight.classList.toggle("active");
        overlay.classList.toggle("active");
        overlay.style.display = overlay.classList.contains("active")
          ? "block"
          : "none";

        // Prevent body scroll when menu is open
        document.body.style.overflow = navRight.classList.contains("active")
          ? "hidden"
          : "";
      }

      // Close menu when clicking nav links
      document.querySelectorAll(".nav-right a").forEach((link) => {
        link.addEventListener("click", () => {
          if (window.innerWidth <= 768) {
            toggleMobileMenu();
          }
        });
      });

      // Theme Toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);

        document.querySelector(".sun-icon").style.display =
          newTheme === "dark" ? "none" : "block";
        document.querySelector(".moon-icon").style.display =
          newTheme === "dark" ? "block" : "none";
      }

      // Load saved theme
      (function () {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);

        if (savedTheme === "dark") {
          document.querySelector(".sun-icon").style.display = "none";
          document.querySelector(".moon-icon").style.display = "block";
        }
      })();

      async function loadProfile() {
        const container = document.getElementById("profileInfo");

        try {
          const response = await fetch("/api/profile");
          const data = await response.json();

          if (response.ok && data.profile) {
            const profile = data.profile;

            container.innerHTML = `
                        <div class="profile-info-item">
                            <span class="profile-info-label">Name:</span>
                            <span class="profile-info-value">${escapeHtml(
                              profile.name
                            )}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Username:</span>
                            <span class="profile-info-value">${escapeHtml(
                              profile.user.username
                            )}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Email:</span>
                            <span class="profile-info-value">${escapeHtml(
                              profile.user.email || "Not set"
                            )}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Phone:</span>
                            <span class="profile-info-value">${escapeHtml(
                              profile.phone || "Not set"
                            )}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Address:</span>
                            <span class="profile-info-value">${escapeHtml(
                              profile.address || "Not set"
                            )}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Position:</span>
                            <span class="profile-info-value">${escapeHtml(
                              profile.position
                            )}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Role:</span>
                            <span class="profile-info-value">
                                ${
                                  profile.is_admin
                                    ? '<span class="profile-badge">ADMIN</span>'
                                    : escapeHtml(profile.role || "Employee")
                                }
                            </span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Salary:</span>
                            <span class="profile-info-value">$${parseFloat(
                              profile.salary
                            ).toLocaleString()}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Join Date:</span>
                            <span class="profile-info-value">${new Date(
                              profile.join_date
                            ).toLocaleDateString("en-US", {
                              year: "numeric",
                              month: "long",
                              day: "numeric",
                            })}</span>
                        </div>
                        <div class="profile-info-item">
                            <span class="profile-info-label">Emergency Contact:</span>
                            <span class="profile-info-value">${escapeHtml(
                              profile.emergency_contact || "Not set"
                            )}</span>
                        </div>
                    `;
          } else {
            container.innerHTML = `
                        <div class="error-message">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Error loading profile information
                        </div>
                    `;
          }
        } catch (error) {
          container.innerHTML = `
                    <div class="error-message">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Error loading profile. Please refresh the page.
                    </div>
                `;
        }
      }

      document
        .getElementById("changePasswordForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const oldPassword = document.getElementById("oldPassword").value;
          const newPassword = document.getElementById("newPassword").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          const errorDiv = document.getElementById("passwordError");
          const successDiv = document.getElementById("passwordSuccess");
          const changePasswordBtn =
            document.getElementById("changePasswordBtn");

          errorDiv.textContent = "";
          errorDiv.style.display = "none";
          successDiv.textContent = "";
          successDiv.style.display = "none";

          // Validate passwords match
          if (newPassword !== confirmPassword) {
            errorDiv.innerHTML = `
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    New passwords do not match
                `;
            errorDiv.style.display = "flex";
            return;
          }

          // Validate password length
          if (newPassword.length < 6) {
            errorDiv.innerHTML = `
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    New password must be at least 6 characters
                `;
            errorDiv.style.display = "flex";
            return;
          }

          // Show loading state
          changePasswordBtn.classList.add("btn-loading");
          changePasswordBtn.disabled = true;

          try {
            const response = await fetch("/api/change-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                old_password: oldPassword,
                new_password: newPassword,
              }),
            });

            const data = await response.json();

            if (response.ok) {
              successDiv.innerHTML = `
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Password changed successfully!
                    `;
              successDiv.style.display = "flex";
              document.getElementById("changePasswordForm").reset();

              // Scroll to success message
              successDiv.scrollIntoView({
                behavior: "smooth",
                block: "center",
              });
            } else {
              errorDiv.innerHTML = `
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        ${data.error || "Error changing password"}
                    `;
              errorDiv.style.display = "flex";
            }
          } catch (error) {
            errorDiv.innerHTML = `
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Connection error. Please try again.
                `;
            errorDiv.style.display = "flex";
          } finally {
            changePasswordBtn.classList.remove("btn-loading");
            changePasswordBtn.disabled = false;
          }
        });

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Load profile with delay to show skeleton
      setTimeout(loadProfile, 400);
    </script>
  </body>
</html>
